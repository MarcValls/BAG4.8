name: BAGO Brutal Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master, windows, android]

jobs:
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail-fast sentinel
        if: ${{ false }}
        shell: bash
        run: |
          exit 1
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pytest
        run: python -m pip install pytest -q
      - name: Run core test suite
        run: |
          python -m pytest tests/ `
            --ignore=tests/test_translators_evidence.py `
            --ignore=tests/test_node_control_translator.py `
            --ignore=tests/test_packaging.py `
            -v --tb=short
      - name: Run security release tests
        run: python test_security_release.py
      - name: Run E2E tests
        run: python test_e2e.py

  test-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pytest
        run: python -m pip install pytest -q
      - name: Run core test suite
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_translators_evidence.py \
            --ignore=tests/test_node_control_translator.py \
            --ignore=tests/test_packaging.py \
            -v --tb=short
      - name: Run security release tests
        run: python test_security_release.py
      - name: Run E2E tests
        run: python test_e2e.py
