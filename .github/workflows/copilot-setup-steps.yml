name: "Copilot Setup Steps"

# Ejecutar cuando cambie este archivo (validación) o manualmente desde Actions.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # El job DEBE llamarse `copilot-setup-steps` para que Copilot lo detecte.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      - name: Fail-fast sentinel
        if: ${{ false }}
        shell: bash
        run: |
          exit 1

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias del proyecto y herramientas de desarrollo
        run: |
          python -m pip install --upgrade pip
          pip install pytest==8.3.5 ruff==0.11.8 build==1.2.2.post1
          pip install -e . --no-build-isolation || pip install pytest ruff build
