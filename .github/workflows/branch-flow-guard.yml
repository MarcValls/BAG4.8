name: Branch Flow Guard

on:
  pull_request:
    branches:
      - main
      - windows
      - android
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions:
  contents: read

jobs:
  branch-flow-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Fail-fast sentinel
        if: ${{ false }}
        shell: bash
        run: |
          exit 1
      - name: Validate branch flow
        shell: bash
        run: |
          set -euo pipefail
          BASE="${{ github.base_ref }}"
          HEAD="${{ github.head_ref }}"
          echo "base=${BASE}"
          echo "head=${HEAD}"

          if [[ "$BASE" == "windows" || "$BASE" == "android" ]]; then
            if [[ "$HEAD" != "main" ]]; then
              echo "::error::PRs hacia ${BASE} solo pueden venir desde main."
              exit 1
            fi
          fi

          if [[ "$BASE" == "main" ]]; then
            if [[ "$HEAD" == "windows" || "$HEAD" == "android" ]]; then
              echo "::error::No se permiten reverse-merges de ramas de plataforma hacia main."
              echo "::error::Haz el cambio en una rama de trabajo y mergea a main."
              exit 1
            fi
          fi

          echo "Branch flow guard: OK"
