name: BAGO CI

on:
  pull_request:
    branches:
      - main
      - master
      - windows
      - android
      - "release/**"
  push:
    branches:
      - main
      - master
      - windows
      - android
      - "release/**"
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  qa:
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Fail-fast sentinel
        if: ${{ false }}
        shell: bash
        run: |
          exit 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ui-react/package-lock.json

      - name: Install Python deps
        run: python -m pip install --upgrade pip && pip install pytest

      - name: Install Node deps
        run: |
          npm ci
          npm ci --prefix ui-react

      - name: Python compile
        run: python -m compileall -q bago_core

      - name: Pytest
        # Integration tests that require installed BAGO runtime are skipped in CI:
        # - test_translators_evidence: needs ir_types from C:\ProgramData\BAGO\pieces
        # - test_node_control_translator: needs translator CLI with BAGO runtime
        run: >
          python -m pytest -q
          --ignore=tests/test_translators_evidence.py
          --ignore=tests/test_node_control_translator.py

      - name: UI build
        run: |
          npm run manager:build-ui
          npm --prefix ui-react run build

      - name: Manager release jobs
        run: npm run manager:test-jobs

      - name: Dependency audit
        run: |
          npm audit --audit-level=high
          npm audit --prefix ui-react --audit-level=high

  update-repo-description:
    name: Update repo About description
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: qa
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Read version and update GitHub repo description
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(cat release_version.txt | tr -d '[:space:]')
          DESCRIPTION="BAGO v${VERSION} — Session-first AI Control Plane. CLI + Manager Electron. Session-centric, provider-agnostic."
          gh api repos/${{ github.repository }} -X PATCH -f description="${DESCRIPTION}"
          echo "Updated repo description to: ${DESCRIPTION}"
