profile: with-knowledge
installer: install-with-knowledge.ps1
command: powershell -NoProfile -ExecutionPolicy Bypass -File .\install-with-knowledge.ps1
knowledge_included: true
runtime_base: identical
notes:
  - Sync memory with bago-knowledge after install
  - Keep the runtime contract unchanged

---

profile: without-knowledge
installer: install-without-knowledge.ps1
command: powershell -NoProfile -ExecutionPolicy Bypass -File .\install-without-knowledge.ps1
knowledge_included: false
runtime_base: identical
notes:
  - Same runtime base, no mounted knowledge tree
  - Use when you want a clean runtime without memory sync
